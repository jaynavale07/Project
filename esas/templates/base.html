<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}ESAS{% endblock %} — FalconX Security Audit System</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1e2d45;
  --navy2: #243351;
  --navy3: #2d3f60;
  --blue: #2563eb;
  --blue2: #1d4ed8;
  --accent: #3b82f6;
  --red: #ef4444;
  --amber: #f59e0b;
  --green: #10b981;
  --purple: #8b5cf6;
  --bg: #f0f4f8;
  --surface: #ffffff;
  --border: #e2e8f0;
  --text: #1e293b;
  --muted: #64748b;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Inter', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }

/* NAV */
.navbar {
  background: var(--navy);
  height: 56px;
  display: flex;
  align-items: center;
  padding: 0 28px;
  gap: 0;
  position: sticky;
  top: 0;
  z-index: 200;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
}
.navbar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  color: #fff;
  text-decoration: none;
  margin-right: 32px;
  flex-shrink: 0;
}
.brand-logo {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, #3b82f6, #ef4444);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px; color: #fff;
}
.brand-name { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
.brand-name span { color: #ef4444; }
.brand-subtitle { font-size: 10px; color: rgba(255,255,255,0.5); font-weight: 400; letter-spacing: 0.5px; }

.nav-links { display: flex; align-items: center; gap: 2px; flex: 1; }
.nav-link {
  color: rgba(255,255,255,0.65);
  text-decoration: none;
  padding: 8px 14px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  transition: all 0.15s;
}
.nav-link:hover { color: #fff; background: rgba(255,255,255,0.08); }
.nav-link.active { color: #fff; background: rgba(59,130,246,0.25); }

.nav-right { display: flex; align-items: center; gap: 12px; margin-left: auto; }
.role-badge {
  font-size: 10px;
  font-family: var(--mono);
  padding: 2px 8px;
  border-radius: 4px;
  border: 1px solid;
}
.role-admin { background: rgba(239,68,68,0.15); color: #fca5a5; border-color: rgba(239,68,68,0.3); }
.role-auditor { background: rgba(245,158,11,0.15); color: #fcd34d; border-color: rgba(245,158,11,0.3); }
.role-viewer { background: rgba(99,102,241,0.15); color: #a5b4fc; border-color: rgba(99,102,241,0.3); }

.user-menu {
  display: flex; align-items: center; gap: 8px;
  color: rgba(255,255,255,0.85);
  font-size: 13px;
  cursor: pointer;
}
.logout-btn {
  color: rgba(255,255,255,0.5);
  text-decoration: none;
  font-size: 12px;
  padding: 5px 10px;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 5px;
  transition: all 0.15s;
}
.logout-btn:hover { color: #fff; border-color: rgba(255,255,255,0.35); }

/* MAIN */
.main-content { padding: 28px; max-width: 1400px; margin: 0 auto; }

/* PAGE HEADER */
.page-header { margin-bottom: 24px; }
.page-header h1 { font-size: 22px; font-weight: 600; color: var(--text); }
.page-header p { font-size: 13px; color: var(--muted); margin-top: 3px; }

/* CARDS */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.card-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-title { font-size: 13px; font-weight: 600; color: var(--text); }
.card-body { padding: 20px; }

/* METRICS */
.metrics-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 24px; }
.metric-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px 20px;
  border-top: 3px solid;
  position: relative;
}
.metric-card.red { border-top-color: var(--red); }
.metric-card.amber { border-top-color: var(--amber); }
.metric-card.green { border-top-color: var(--green); }
.metric-card.blue { border-top-color: var(--blue); }
.metric-label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px; }
.metric-value { font-size: 28px; font-weight: 700; font-family: var(--mono); line-height: 1; }
.metric-value.red { color: var(--red); }
.metric-value.amber { color: var(--amber); }
.metric-value.green { color: var(--green); }
.metric-value.blue { color: var(--blue); }
.metric-sub { font-size: 11px; color: var(--muted); margin-top: 5px; }

/* BADGES */
.badge { display: inline-flex; align-items: center; font-size: 10px; font-weight: 700; font-family: var(--mono); padding: 2px 7px; border-radius: 3px; white-space: nowrap; }
.badge-critical { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
.badge-high { background: #fffbeb; color: #d97706; border: 1px solid #fde68a; }
.badge-medium { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
.badge-low { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
.badge-pass { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
.badge-fail { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
.badge-partial { background: #fffbeb; color: #d97706; border: 1px solid #fde68a; }
.badge-running { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
.badge-pending { background: #f8fafc; color: #64748b; border: 1px solid #e2e8f0; }
.badge-completed { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }

/* BUTTONS */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 18px; border-radius: 7px; font-size: 13px;
  font-weight: 600; cursor: pointer; border: none; transition: all 0.15s;
  text-decoration: none; font-family: var(--sans);
}
.btn-primary { background: var(--blue); color: #fff; }
.btn-primary:hover { background: var(--blue2); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37,99,235,0.3); }
.btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: #94a3b8; background: var(--bg); }
.btn-danger { background: #fef2f2; color: var(--red); border: 1px solid #fecaca; }
.btn-danger:hover { background: var(--red); color: #fff; }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.btn-lg { padding: 12px 28px; font-size: 15px; }

/* TABLES */
.table-wrap { overflow-x: auto; }
table.data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
table.data-table th { text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid var(--border); background: #f8fafc; white-space: nowrap; }
table.data-table td { padding: 11px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
table.data-table tr:last-child td { border-bottom: none; }
table.data-table tr:hover td { background: #f8fafc; }
.mono { font-family: var(--mono); font-size: 11px; color: var(--blue); }

/* PROGRESS */
.progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }

/* FORM */
.form-group { margin-bottom: 16px; }
label.form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
input.form-input, select.form-select, textarea.form-textarea {
  width: 100%; padding: 9px 12px; border: 1.5px solid var(--border);
  border-radius: 7px; font-size: 13px; font-family: var(--sans);
  color: var(--text); background: var(--surface); outline: none; transition: border-color 0.15s;
}
input.form-input:focus, select.form-select:focus, textarea.form-textarea:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-section { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 22px 24px; margin-bottom: 16px; }
.form-section-title { font-size: 14px; font-weight: 600; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.form-section-num { background: var(--blue); color: #fff; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }

/* RADIO / CHECKBOX */
.radio-group, .check-group { display: flex; gap: 20px; flex-wrap: wrap; }
.radio-label, .check-label { display: flex; align-items: center; gap: 7px; font-size: 13px; cursor: pointer; }
input[type=radio], input[type=checkbox] { accent-color: var(--blue); width: 15px; height: 15px; cursor: pointer; }

/* TABS */
.tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 20px; gap: 0; }
.tab { padding: 10px 18px; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--blue); border-bottom-color: var(--blue); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ALERTS */
.alert { display: flex; gap: 12px; padding: 12px 16px; border-radius: 8px; margin-bottom: 10px; font-size: 13px; border: 1px solid; }
.alert-critical { background: #fef2f2; border-color: #fecaca; color: #991b1b; }
.alert-high { background: #fffbeb; border-color: #fde68a; color: #92400e; }
.alert-info { background: #eff6ff; border-color: #bfdbfe; color: #1e40af; }
.alert-success { background: #f0fdf4; border-color: #bbf7d0; color: #166534; }
.alert-icon { font-size: 16px; flex-shrink: 0; line-height: 1.2; }

/* COMPLIANCE BAR */
.comp-bar-wrap { margin-bottom: 14px; }
.comp-bar-header { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
.comp-bar-track { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
.comp-bar-fill { height: 100%; border-radius: 4px; transition: width 1s ease; }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: none; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: 12px; width: 520px; max-width: 95vw; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
.modal-header { padding: 18px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-size: 15px; font-weight: 600; }
.modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--muted); line-height: 1; padding: 2px 6px; border-radius: 4px; }
.modal-close:hover { background: var(--bg); color: var(--text); }
.modal-body { padding: 22px; }
.modal-footer { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

/* TOAST */
.toast-container { position: fixed; top: 70px; right: 20px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
.toast { background: var(--navy); color: #fff; padding: 12px 16px; border-radius: 8px; font-size: 13px; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 16px rgba(0,0,0,0.2); animation: slideIn 0.3s ease; min-width: 280px; border-left: 3px solid var(--green); }
.toast.error { border-left-color: var(--red); }
.toast.warning { border-left-color: var(--amber); }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* TOPOLOGY */
#topology-canvas { width: 100%; height: 380px; border: 1px solid var(--border); border-radius: 8px; background: #0f1729; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

/* GRID UTILS */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
.mb-4 { margin-bottom: 16px; }
.mb-6 { margin-bottom: 24px; }
.flex { display: flex; }
.items-center { align-items: center; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.ml-auto { margin-left: auto; }
.text-muted { color: var(--muted); font-size: 12px; }
.text-mono { font-family: var(--mono); font-size: 11px; }
</style>
{% block extra_head %}{% endblock %}
</head>
<body>
{% if current_user.is_authenticated %}
<nav class="navbar">
  <a href="/dashboard" class="navbar-brand">
    <div class="brand-logo">FX</div>
    <div>
      <div class="brand-name">Falcon<span>X</span></div>
      <div class="brand-subtitle">Security Audit System</div>
    </div>
  </a>
  <div class="nav-links">
    <a href="/dashboard" class="nav-link {% if request.path == '/dashboard' %}active{% endif %}">Dashboard</a>
    <a href="/configure" class="nav-link {% if request.path == '/configure' %}active{% endif %}">New Audit</a>
    <a href="/reports" class="nav-link {% if request.path == '/reports' %}active{% endif %}">Reports</a>
    <a href="/settings" class="nav-link {% if request.path == '/settings' %}active{% endif %}">Settings</a>
  </div>
  <div class="nav-right">
    <span class="role-badge role-{{ current_user.role }}">{{ current_user.role.upper() }}</span>
    <div class="user-menu">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      {{ current_user.username }}
    </div>
    <a href="/logout" class="logout-btn">Logout</a>
  </div>
</nav>
{% endif %}

<div class="toast-container" id="toastContainer"></div>

{% block content %}{% endblock %}

<script>
function toast(msg, type='success') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${type==='success'?'✓':type==='error'?'✗':'⚠'}</span> ${msg}`;
  c.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function switchTab(tabGroup, tabId) {
  document.querySelectorAll(`[data-tabgroup="${tabGroup}"]`).forEach(t => t.classList.remove('active'));
  document.querySelectorAll(`[data-tabpanel="${tabGroup}"]`).forEach(p => p.classList.remove('active'));
  document.querySelector(`[data-tabgroup="${tabGroup}"][data-tab="${tabId}"]`).classList.add('active');
  document.getElementById(`panel-${tabGroup}-${tabId}`).classList.add('active');
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
